<div class="app-container">
  <app-game-header 
    [score]="gameState().score"
    [bestScore]="gameState().bestScore"
    [isWon]="gameState().isWon"
    [isGameOver]="gameState().isGameOver"

    (continue)="onContinue()">
  </app-game-header>
  
  <app-game-board></app-game-board>
</div>
